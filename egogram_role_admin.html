<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エゴグラム 管理者ダッシュボード（役職別）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a2e;--mid:#3a3a5a;--light:#8888aa;--bg:#f5f4f0;--paper:#fffef9;--border:#d4d0c8;--cp:#c0392b;--np:#2c7a50;--a:#2c5282;--fc:#b7791f;--ac:#6b46a0;--up:#1a7a4a;--dn:#c0392b;--warn:#b7791f;--va:#ad1457;--vb:#283593;--vc:#00695c;--vd:#bf360c;--ve:#827717}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ヘッダー */
.top-bar{background:var(--ink);color:#fff;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700}
.top-actions{display:flex;gap:10px;align-items:center}
.btn{border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-white{background:#fff;color:var(--ink)}
.btn-white:hover{background:#e8e6e0}
.btn-ghost{background:rgba(255,255,255,0.1);color:#e8e6e0;border:1px solid rgba(255,255,255,0.2)}
.btn-ghost:hover{background:rgba(255,255,255,0.2)}
.btn-warn{background:rgba(192,57,43,0.15);color:#e57a6a;border:1px solid rgba(192,57,43,0.3)}
.btn-warn:hover{background:rgba(192,57,43,0.3)}

/* メインレイアウト */
.main{display:flex;flex-direction:column;gap:0}

/* タブ */
.tabs{background:var(--paper);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0}
.tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--light);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:700}

/* コンテンツ */
.content{padding:28px 32px;display:flex;flex-direction:column;gap:24px}
.tab-content{display:none}
.tab-content.active{display:flex;flex-direction:column;gap:24px}

/* サマリーカード */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.summary-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:16px 20px}
.summary-label{font-size:11px;color:var(--light);letter-spacing:.08em;margin-bottom:6px}
.summary-value{font-size:28px;font-weight:700;color:var(--ink)}
.summary-sub{font-size:11px;color:var(--light);margin-top:4px}

/* テーブル */
.table-wrap{background:var(--paper);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700}
.table-actions{display:flex;gap:8px}
.filter-input{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--ink);outline:none;width:160px}
.filter-input:focus{border-color:var(--light)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--light);letter-spacing:.08em;text-align:left;padding:10px 14px;background:#f7f5ef;border-bottom:1px solid var(--border)}
td{font-size:12px;color:var(--mid);padding:10px 14px;border-bottom:1px solid #ebe9e3;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf8f4}
.score-pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;min-width:28px;text-align:center}
.type-badge{display:inline-block;background:var(--ink);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.role-mgr{background:#dce9f7;color:#1a3a7a}
.role-gen{background:#e8f5e9;color:#1a5c34}
.role-jun{background:#fef6e4;color:#7a4f0a}


.concern-badge{display:inline-block;background:#fde8e8;color:#c0392b;border:1px solid rgba(192,57,43,0.2);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.ok-badge{display:inline-block;background:#edf7f1;color:#1a7a4a;border:1px solid rgba(26,122,74,0.2);padding:2px 8px;border-radius:10px;font-size:10px}
.delta-up{color:#1a7a4a;font-weight:700}
.delta-dn{color:#c0392b;font-weight:700}
.delta-neu{color:var(--light)}
.session-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--bg);border:1px solid var(--border);border-radius:50%;font-size:10px;font-weight:700;color:var(--mid)}
.empty-row td{text-align:center;padding:32px;color:var(--light);font-size:13px}

/* チャートグリッド */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:20px;min-width:0;overflow-x:hidden}
.chart-card-full{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:20px;min-width:0;overflow-x:hidden}
.chart-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;margin-bottom:12px}

/* 要注意リスト */
.concern-list{display:flex;flex-direction:column;gap:10px}
.concern-item{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:14px 18px;border-left:4px solid}
.concern-item.high{border-left-color:#c0392b}
.concern-item.mid{border-left-color:#b7791f}
.concern-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.concern-name{font-size:14px;font-weight:700;color:var(--ink)}
.concern-date{font-size:11px;color:var(--light)}
.concern-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.concern-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.concern-tag.red{background:#fde8e8;color:#c0392b}
.concern-tag.amber{background:#fef6e4;color:#92700a}
.concern-text{font-size:12px;color:var(--mid);line-height:1.7}

/* インポートエリア */
.import-area{background:var(--paper);border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all .2s}
.import-area:hover{border-color:var(--light);background:#f7f5ef}
.import-area.drag{border-color:var(--ink);background:#f0ede6}

/* ページネーション */
.pagination{display:flex;gap:6px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--border)}
.page-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:5px;background:var(--paper);color:var(--mid);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.page-btn:hover,.page-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.expand-btn{font-size:10px;padding:2px 5px;background:none;border:1px solid var(--border);border-radius:3px;cursor:pointer;color:var(--light);font-family:'Noto Sans JP',sans-serif}
.expand-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--paper);border-radius:10px;padding:28px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;cursor:pointer;color:var(--light);font-size:18px;line-height:1}
.modal-close:hover{color:var(--ink)}

/* レポートモーダル内スタイル */
.rm-doc { font-family: 'Noto Sans JP', sans-serif; background: #fffef9; }
.rm-header { background: #1a1a2e; color: #fff; padding: 18px 28px; display: flex; justify-content: space-between; align-items: flex-end; }
.rm-title-main { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; }
.rm-label { font-size: 8px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
.rm-meta { text-align: right; font-size: 11px; color: rgba(255,255,255,0.55); line-height: 1.8; }
.rm-meta strong { color: #fff; }
.rm-score-row { display: flex; padding: 12px 28px; border-bottom: 1px solid #d4d0c8; background: #fff; }
.rm-score-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 8px; border-right: 1px solid #d4d0c8; }
.rm-score-item:last-child { border-right: none; }
.rm-score-key { font-size: 10px; font-weight: 700; letter-spacing: .08em; }
.rm-score-bar-track { width: 100%; height: 4px; background: #e8e6e0; border-radius: 2px; overflow: hidden; }
.rm-score-bar-fill { height: 100%; border-radius: 2px; }
.rm-score-num { font-size: 17px; font-weight: 700; }
.rm-score-name { font-size: 8px; color: #8888aa; text-align: center; }
.rm-type-row { padding: 8px 28px; background: #f3f1ea; border-bottom: 2px solid #1a1a2e; display: flex; align-items: center; gap: 12px; }
.rm-type-badge { background: #1a1a2e; color: #fff; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.rm-type-summary { font-size: 11px; font-weight: 500; color: #3a3a5a; }
.rm-type-sub { font-size: 9px; color: #8888aa; }
.rm-body { padding: 16px 28px; display: flex; flex-direction: column; gap: 0; }
.rm-section { padding: 10px 0; border-bottom: 1px solid #d4d0c8; }
.rm-section:last-child { border-bottom: none; }
.rm-sec-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.rm-sec-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; }
.rm-sec-title { font-family: 'Noto Serif JP', serif; font-size: 12px; font-weight: 700; color: #1a1a2e; }
.rm-sec-body { padding-left: 28px; font-size: 11px; line-height: 1.8; color: #3a3a5a; }
.rm-sec-body p { margin-bottom: 5px; }
.rm-sec-body p:last-child { margin-bottom: 0; }
.rm-note { border-left: 2px solid #1a1a2e; padding: 6px 10px; background: #f0ede6; border-radius: 0 4px 4px 0; margin-top: 5px; font-size: 10px; line-height: 1.7; color: #1a1a2e; }
.rm-msg { background: #1a1a2e; border-radius: 5px; padding: 10px 14px; margin-top: 4px; }
.rm-msg-label { font-size: 8px; letter-spacing: .1em; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
.rm-msg-text { font-size: 11px; line-height: 1.75; color: #e8e6e0; }
.rm-action-list { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.rm-action-item { display: flex; gap: 6px; align-items: flex-start; background: #f7f5ef; border-radius: 4px; padding: 5px 8px; }
.rm-action-num { background: #1a1a2e; color: #fff; border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.rm-action-text { font-size: 11px; line-height: 1.65; color: #3a3a5a; }

</style>
</head>
<body>

<!-- ヘッダー -->
<div class="top-bar">
  <div class="top-title">エゴグラム 管理者ダッシュボード（役職別）</div>
  <div class="top-actions" style="gap:12px">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:rgba(255,255,255,0.4)">グループ：</span>
      <select id="group-select" onchange="onGroupSelect(this.value)"
        style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:5px;padding:5px 10px;color:#fff;font-size:12px;font-family:'Noto Sans JP',sans-serif;outline:none;min-width:200px">
      </select>
      <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="createGroup()">＋ 新規</button>
      <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="deleteGroup()">削除</button>
    </div>
    <a id="nav-input" class="btn btn-ghost" href="egogram_role_input.html" style="font-size:11px;padding:5px 10px;text-decoration:none">📋 入力フォーム</a>
    <button class="btn btn-ghost" onclick="importCSV()">📂 インポート</button>
    <button class="btn btn-white" onclick="exportCSV()">📊 CSVエクスポート</button>
    <button class="btn btn-white" onclick="refreshData()">🔄 更新</button>
  </div>
</div>

<!-- タブ -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">📊 概要</div>
  <div class="tab" onclick="switchTab('list')">📋 一覧表</div>
  <div class="tab" onclick="switchTab('concern')">⚠️ 要注意リスト</div>
  <div class="tab" onclick="switchTab('distribution')">📈 タイプ分布</div>
</div>

<div class="content">

  <!-- 概要タブ -->
  <div id="tab-overview" class="tab-content active">
    <div class="summary-grid" id="summary-grid"></div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">タイプ分布（最新回）</div>
        <div style="position:relative;height:220px"><canvas id="typeChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">スコア平均値（最新回）</div>
        <div style="position:relative;height:220px"><canvas id="avgChart"></canvas></div>
      </div>
    </div>
    <div class="chart-card-full">
      <div class="chart-title">全体スコア推移（グループ平均）</div>
      <div style="position:relative;height:200px"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="chart-card-full" id="roleCompareCard">
      <div class="chart-title">役職別 平均スコア比較</div>
      <div style="position:relative;height:220px"><canvas id="roleCompareChart"></canvas></div>
    </div>
  </div>

  <!-- 一覧表タブ -->
  <div id="tab-list" class="tab-content">
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">受検者一覧</div>
        <div class="table-actions">
          <input class="filter-input" id="search-input" type="text" placeholder="氏名・役職で検索..." oninput="renderTable()">
          <select class="filter-input" id="role-filter" onchange="renderTable()" style="width:110px">
            <option value="">全役職</option>
            <option value="管理職">管理職</option>
            <option value="一般">一般</option>
            <option value="若手">若手</option>
          </select>
          <button class="btn btn-white" onclick="exportCSV()" style="font-size:11px">CSVで出力</button>
        </div>
      </div>
      <table id="main-table">
        <thead>
          <tr>
            <th id="th-name"  onclick="adminSortBy('name')"  style="cursor:pointer">氏名</th>
            <th id="th-count" onclick="adminSortBy('count')" style="cursor:pointer">回数</th>
            <th id="th-date"  onclick="adminSortBy('date')"  style="cursor:pointer">最終日</th>
            <th id="th-role" onclick="adminSortBy('role')" style="cursor:pointer">役職</th>
            <th>タイプ</th>
            <th style="color:var(--cp);cursor:pointer" id="th-cp" onclick="adminSortBy('cp')">CP</th>
            <th style="color:var(--np);cursor:pointer" id="th-np" onclick="adminSortBy('np')">NP</th>
            <th style="color:var(--a);cursor:pointer"  id="th-a"  onclick="adminSortBy('a')">A</th>
            <th style="color:var(--fc);cursor:pointer" id="th-fc" onclick="adminSortBy('fc')">FC</th>
            <th style="color:var(--ac);cursor:pointer" id="th-ac" onclick="adminSortBy('ac')">AC</th>
            <th id="th-total" onclick="adminSortBy('total')" style="cursor:pointer">合計</th>
            <th>前回比</th><th>状態</th><th colspan="2">レポート出力</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- 要注意リスト -->
  <div id="tab-concern" class="tab-content">
    <div class="table-wrap" style="padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="chart-title" style="margin:0">懸念事項が検出された受検者</div>
        <div style="font-size:12px;color:var(--light)">ACとFCの変化・複合パターンから自動抽出</div>
      </div>
      <div id="concern-list" class="concern-list"></div>
    </div>
  </div>

  <!-- タイプ分布タブ -->
  <div id="tab-distribution" class="tab-content">
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">15タイプ分布（最新回のみ）</div>
        <div style="position:relative;height:280px"><canvas id="typeBarChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">人生態度マトリクス分布</div>
        <div style="position:relative;height:280px"><canvas id="matrixChart"></canvas></div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><div class="table-title">タイプ別一覧</div></div>
      <table>
        <thead><tr><th>タイプ</th><th>人数</th><th>割合</th><th>氏名</th></tr></thead>
        <tbody id="type-detail-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>



<!-- CSV import input (hidden) -->
<input type="file" id="csv-file-input" accept=".csv,.json" style="display:none" onchange="handleFileImport(event)">

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal" style="width:500px">
    <span class="modal-close" onclick="closeEditModal()">✕</span>
    <div class="modal-title">データ編集</div>
    <div id="edit-modal-body"></div>
  </div>
</div>

<!-- 変化レポートモーダル -->
<div class="modal-overlay" id="change-modal">
  <div class="modal" style="width:780px;max-width:96vw;max-height:94vh;padding:0;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:14px 24px;background:var(--ink);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div style="font-family:'Noto Serif JP',serif;font-size:15px;font-weight:700;color:#fff" id="chg-modal-title">変化分析レポート</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-white" style="font-size:11px;padding:5px 12px" onclick="downloadChangePDF()">📄 PDF出力</button>
        <span style="cursor:pointer;color:rgba(255,255,255,0.4);font-size:20px;line-height:1;padding:0 4px" onclick="closeChangeModal()">✕</span>
      </div>
    </div>
    <div style="overflow-y:auto;flex:1" id="chg-modal-body"></div>
  </div>
</div>

<script>
var GROUP_LIST_KEY    = 'egogram_role_groups_v1';
var SESSION_GROUP_KEY = 'egogram_role_current_group';
var currentGroup      = '';
var STORAGE_KEY       = 'egogram_role_history_v1';

function getGroupKey(g){ return g ? 'egogram_role_group_'+g : 'egogram_role_history_v1'; }
function loadGroups(){ try{return JSON.parse(localStorage.getItem(GROUP_LIST_KEY))||[];}catch(e){return[];} }

function getCurrentGroup(){
  var urlP = new URLSearchParams(window.location.search);
  var urlG = urlP.get('group');
  if(urlG !== null) return urlG;
  return sessionStorage.getItem(SESSION_GROUP_KEY) || '';
}
var TYPE_MASTER = {
  'CP-A':'統率リーダー','CP-NP':'熱血指導者','CP-FC':'理想追求','CP-AC':'忍耐完遂',
  'NP-A':'サポートリーダー','NP-AC':'包容力','NP-FC':'ムードメーカー','NP-CP':'母性リーダー',
  'A-CP':'戦略','A-NP':'バランス','A-FC':'研究者','A-AC':'堅実分析',
  'FC-A':'アイデアマン','FC-NP':'エンターテイナー','FC-AC':'自由人','FC-CP':'改革推進',
  'AC-CP':'努力家','AC-NP':'サポート役','AC-A':'慎重','AC-FC':'共感表現'
};

var PAGE_SIZE = 20;
var currentPage = 1;
var allPersons = [];
var adminSortKey = 'date';
var adminSortDir = -1;
var adminExpanded = {};

// ===== データ読み込み =====
function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; }
  catch(e){ return []; }
}
function saveHistory(h){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }
  catch(e){ alert('保存失敗'); }
}

function getPersons(){
  var h = loadHistory();
  var map = {};
  h.forEach(function(s){
    if(!map[s.name]) map[s.name]=[];
    map[s.name].push(s);
  });
  return Object.entries(map).map(function(e){
    return { name:e[0], sessions: e[1].sort(function(a,b){return a.date.localeCompare(b.date);}) };
  });
}

function getTypeKey(scores){
  var entries=[['CP',scores.cp],['NP',scores.np],['A',scores.a],['FC',scores.fc],['AC',scores.ac]];
  entries.sort(function(a,b){return b[1]-a[1];});
  return entries[0][0]+'-'+entries[1][0];
}

function calcConcerns(person){
  var concerns = [];
  var sessions = person.sessions;
  var latest = sessions[sessions.length-1];
  var prev   = sessions.length>=2 ? sessions[sessions.length-2] : null;

  if(prev){
    var d = {
      cp: latest.scores.cp - prev.scores.cp,
      np: latest.scores.np - prev.scores.np,
      a:  latest.scores.a  - prev.scores.a,
      fc: latest.scores.fc - prev.scores.fc,
      ac: latest.scores.ac - prev.scores.ac
    };
    if(d.ac>=3 && d.fc<=-2) concerns.push({level:'high', text:'AC上昇＋FC低下：自己抑圧・ストレス蓄積の典型パターン', key:'ac-fc'});
    if(d.ac>=4)  concerns.push({level:'high', text:'AC大幅上昇(+'+d.ac+')：我慢・抑圧が急増している可能性', key:'ac-up'});
    if(d.fc<=-4) concerns.push({level:'high', text:'FC大幅低下('+d.fc+')：活力・自己肯定感の著しい低下', key:'fc-dn'});
    if(d.np<=-4) concerns.push({level:'mid',  text:'NP大幅低下('+d.np+')：余裕・思いやりの余裕がなくなっている可能性', key:'np-dn'});
    if(d.a<=-4)  concerns.push({level:'mid',  text:'A大幅低下('+d.a+')：冷静な判断力が低下しているサイン', key:'a-dn'});
    if(d.np<=-2 && d.a<=-2) concerns.push({level:'mid', text:'NP・A同時低下：疲弊・余裕喪失のサイン', key:'np-a-dn'});
    var totalDelta = d.cp+d.np+d.a+d.fc+d.ac;
    if(totalDelta<=-8) concerns.push({level:'high', text:'合計エネルギー大幅低下('+totalDelta+')：全体的な疲弊・消耗の可能性', key:'total-dn'});
  }

  // 絶対値チェック
  if(latest.scores.ac>=16) concerns.push({level:'mid', text:'AC='+latest.scores.ac+'（極めて高い）：「隠すタイプ」の典型。本音を隠している可能性大', key:'ac-abs'});
  if(latest.scores.fc<=4)  concerns.push({level:'mid', text:'FC='+latest.scores.fc+'（極めて低い）：活力・楽しさの著しい低下', key:'fc-abs'});

  return concerns;
}

// ===== タブ切替 =====
function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t,i){
    var names=['overview','list','concern','distribution'];
    t.classList.toggle('active', names[i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='distribution') renderDistribution();
}

// ===== 概要タブ =====
function renderOverview(){
  var persons = getPersons();
  allPersons = persons;
  var total = persons.length;
  var multiSession = persons.filter(function(p){return p.sessions.length>=2;}).length;
  var concernCount = persons.filter(function(p){return calcConcerns(p).length>0;}).length;
  var roleCounts = {管理職:0, 一般:0, 若手:0};
  persons.forEach(function(p){
    var role = (p.sessions[p.sessions.length-1].role)||'';
    if(roleCounts[role]!==undefined) roleCounts[role]++;
  });
  var allSessions = loadHistory().length;

  var baseCards = [
    {label:'受検者数', value:total+'名', sub:'累計'},
    {label:'総セッション数', value:allSessions+'回', sub:'全受検者合計'},
    {label:'複数回受検', value:multiSession+'名', sub:'変化追跡可能'},
    {label:'要注意者', value:concernCount+'名', sub:'懸念事項あり', warn:concernCount>0}
  ];
  var gridHtml = baseCards.map(function(c){
    return '<div class="summary-card">'+
      '<div class="summary-label">'+c.label+'</div>'+
      '<div class="summary-value" style="'+(c.warn?'color:var(--dn)':'')+'">'+c.value+'</div>'+
      '<div class="summary-sub">'+c.sub+'</div></div>';
  }).join('');
  // 役職別内訳カード
  gridHtml += '<div class="summary-card" style="grid-column:span 2">'+
    '<div class="summary-label">役職別内訳</div>'+
    '<div style="display:flex;gap:12px;margin-top:6px;flex-wrap:wrap">'+
    ['管理職','一般','若手'].map(function(r){
      var cls = r==='管理職'?'role-mgr':r==='若手'?'role-jun':'role-gen';
      return '<div style="display:flex;align-items:center;gap:6px">'+
        '<span class="role-badge '+cls+'">'+r+'</span>'+
        '<span style="font-size:20px;font-weight:700;color:var(--ink)">'+roleCounts[r]+'</span>'+
        '<span style="font-size:11px;color:var(--light)">名</span></div>';
    }).join('')+
    '</div></div>';
  document.getElementById('summary-grid').innerHTML = gridHtml;

  // タイプ分布チャート
  var typeCounts = {};
  persons.forEach(function(p){
    var k = getTypeKey(p.sessions[p.sessions.length-1].scores);
    var tmE = TYPE_MASTER[k];
    var t = tmE ? (typeof tmE==='object' ? tmE.name : tmE) : k;
    typeCounts[t] = (typeCounts[t]||0)+1;
  });
  var typeEntries = Object.entries(typeCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  if(window._typeChart) window._typeChart.destroy();
  var tc = document.getElementById('typeChart');
  if(tc && typeEntries.length>0){
    window._typeChart = new Chart(tc,{
      type:'doughnut',
      data:{
        labels:typeEntries.map(function(e){return e[0]+'タイプ';}),
        datasets:[{data:typeEntries.map(function(e){return e[1];}),
          backgroundColor:['#1a1a2e','#2c5282','#2c7a50','#b7791f','#6b46a0','#c0392b','#4a7a9b','#8a6a30'],
          borderWidth:2,borderColor:'#fffef9'}]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,padding:8}}}}
    });
  }

  // 平均スコアチャート
  var keys=['cp','np','a','fc','ac'];
  var labels=['CP','NP','A','FC','AC'];
  var colors=['#c0392b','#2c7a50','#2c5282','#b7791f','#6b46a0'];
  var avgs = keys.map(function(k){
    if(persons.length===0) return 0;
    return Math.round(persons.reduce(function(s,p){
      return s+p.sessions[p.sessions.length-1].scores[k];},0)/persons.length*10)/10;
  });
  if(window._avgChart) window._avgChart.destroy();
  var ac = document.getElementById('avgChart');
  if(ac && persons.length>0){
    window._avgChart = new Chart(ac,{
      type:'bar',
      data:{labels:labels,datasets:[{data:avgs,backgroundColor:colors,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{min:0,max:20,ticks:{stepSize:5,font:{size:10}}},x:{ticks:{font:{size:11}}}}}
    });
  }

  // 推移チャート（全体平均）
  renderTrendChart(persons);

  // 役職別スコア比較チャート
  renderRoleCompareChart(persons);
}

function renderTrendChart(persons){
  // 全日付を収集
  var allDates = [];
  persons.forEach(function(p){
    p.sessions.forEach(function(s){ if(allDates.indexOf(s.date)<0) allDates.push(s.date); });
  });
  allDates.sort();
  if(allDates.length<2){ document.getElementById('trendChart').closest('.chart-card-full').style.display='none'; return; }

  var keys=['cp','np','a','fc','ac'];
  var colors=['#c0392b','#2c7a50','#2c5282','#b7791f','#6b46a0'];
  var labels=['CP','NP','A','FC','AC'];
  var datasets = keys.map(function(k,i){
    var data = allDates.map(function(date){
      var vals = [];
      persons.forEach(function(p){
        var s = p.sessions.find(function(ss){return ss.date===date;});
        if(s) vals.push(s.scores[k]);
      });
      return vals.length>0 ? Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*10)/10 : null;
    });
    return {label:labels[i],data:data,borderColor:colors[i],backgroundColor:colors[i].replace(')',',0.08)').replace('rgb','rgba'),tension:.4,pointRadius:3,spanGaps:true};
  });

  if(window._trendChart) window._trendChart.destroy();
  var tc = document.getElementById('trendChart');
  if(!tc) return;
  window._trendChart = new Chart(tc,{
    type:'line',data:{labels:allDates.map(function(d){return d.slice(5);}),datasets:datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:8,padding:10}}},
      scales:{y:{min:0,max:20,ticks:{stepSize:5,font:{size:10}}},x:{ticks:{font:{size:10}},grid:{display:false}}}}
  });
}

// ===== 役職別スコア比較チャート =====
function renderRoleCompareChart(persons) {
  var roles = ['管理職', '一般', '若手'];
  var keys  = ['cp','np','a','fc','ac'];
  var labels = ['CP','NP','A','FC','AC'];
  var roleColors = { '管理職': '#1a3a7a', '一般': '#1a5c34', '若手': '#b7791f' };

  // 役職ごとに平均スコアを計算
  var hasAny = false;
  var datasets = roles.map(function(role) {
    var rolePersons = persons.filter(function(p) {
      return (p.sessions[p.sessions.length-1].role||'') === role;
    });
    if (rolePersons.length > 0) hasAny = true;
    var data = keys.map(function(k) {
      if (rolePersons.length === 0) return null;
      return Math.round(
        rolePersons.reduce(function(sum, p) {
          return sum + p.sessions[p.sessions.length-1].scores[k];
        }, 0) / rolePersons.length * 10
      ) / 10;
    });
    return {
      label: role + '（' + rolePersons.length + '名）',
      data: data,
      backgroundColor: roleColors[role] + 'cc',
      borderColor: roleColors[role],
      borderWidth: 1,
      borderRadius: 4
    };
  });

  var card = document.getElementById('roleCompareCard');
  if (card) card.style.display = hasAny ? '' : 'none';
  if (!hasAny) return;

  if (window._roleCompareChart) window._roleCompareChart.destroy();
  var el = document.getElementById('roleCompareChart');
  if (!el) return;
  window._roleCompareChart = new Chart(el, {
    type: 'bar',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 12 } }
      },
      scales: {
        y: { min: 0, max: 20, ticks: { stepSize: 5, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.06)' } },
        x: { ticks: { font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

// ===== 一覧表 =====
function adminSortBy(key){
  if(adminSortKey===key){ adminSortDir*=-1; } else { adminSortKey=key; adminSortDir=key==='name'?1:-1; }
  updateAdminSortHeaders();
  renderTable();
}
function updateAdminSortHeaders(){
  ['name','count','date','cp','np','a','fc','ac','total'].forEach(function(c){
    var el=document.getElementById('th-'+c);
    if(!el) return;
    // 既存のソート表示を削除してシンプルに更新
    el.style.background = (c===adminSortKey) ? 'rgba(26,26,46,0.08)' : '';
  });
}
function adminToggleExpand(name){
  adminExpanded[name] = !adminExpanded[name];
  renderTable();
}

function roleHtml(role){
  if(!role) return '<span style="color:var(--light);font-size:11px">—</span>';
  var cls = role==='管理職' ? 'role-mgr' : role==='若手' ? 'role-jun' : 'role-gen';
  return '<span class="role-badge '+cls+'">'+role+'</span>';
}

function renderTable(){
  var persons = allPersons.slice();
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  if(q) persons = persons.filter(function(p){
    var latest = p.sessions[p.sessions.length-1];
    var role = (latest.role||'').toLowerCase();
    return p.name.toLowerCase().indexOf(q)>=0 || role.indexOf(q)>=0;
  });
  var roleF = document.getElementById('role-filter') ? document.getElementById('role-filter').value : '';
  if(roleF) persons = persons.filter(function(p){
    var latest = p.sessions[p.sessions.length-1];
    return (latest.role||'') === roleF;
  });

  // ソート
  persons.sort(function(a,b){
    var latest_a = a.sessions[a.sessions.length-1];
    var latest_b = b.sessions[b.sessions.length-1];
    switch(adminSortKey){
      case 'name':  return a.name.localeCompare(b.name)*adminSortDir;
      case 'count': return (a.sessions.length - b.sessions.length)*adminSortDir;
      case 'date':  return latest_a.date.localeCompare(latest_b.date)*adminSortDir;
      case 'role':  return (latest_a.role||'').localeCompare(latest_b.role||'')*adminSortDir;
      case 'total':
        var ta = latest_a.scores.cp+latest_a.scores.np+latest_a.scores.a+latest_a.scores.fc+latest_a.scores.ac;
        var tb = latest_b.scores.cp+latest_b.scores.np+latest_b.scores.a+latest_b.scores.fc+latest_b.scores.ac;
        return (ta-tb)*adminSortDir;
      default:
        return ((latest_a.scores[adminSortKey]||0)-(latest_b.scores[adminSortKey]||0))*adminSortDir;
    }
  });

  var total = persons.length;
  var pages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  currentPage = Math.min(currentPage, pages);
  var start = (currentPage-1)*PAGE_SIZE;
  var slice = persons.slice(start, start+PAGE_SIZE);

  var tbody = document.getElementById('table-body');
  if(slice.length===0){
    tbody.innerHTML='<tr class="empty-row"><td colspan="15">データがありません</td></tr>';
  } else {
    var html = '';
    slice.forEach(function(p){
      var latest = p.sessions[p.sessions.length-1];
      var prev   = p.sessions.length>=2 ? p.sessions[p.sessions.length-2] : null;
      var s      = latest.scores;
      var tot    = s.cp+s.np+s.a+s.fc+s.ac;
      var tk     = getTypeKey(s);
      var tmEntry = TYPE_MASTER[tk];
      var tn     = tmEntry ? (typeof tmEntry === 'object' ? tmEntry.name : tmEntry) : tk;
      var concerns = calcConcerns(p);
      var hasConcern = concerns.length>0;
      var isExpanded = !!adminExpanded[p.name];

      var deltaHtml = '—';
      if(prev){
        var prevTot = prev.scores.cp+prev.scores.np+prev.scores.a+prev.scores.fc+prev.scores.ac;
        var d = tot-prevTot;
        deltaHtml = d===0 ? '—' : '<span class="'+(d>0?'delta-up':'delta-dn')+'">'+(d>0?'▲+':'▼')+Math.abs(d)+'</span>';
      }

      var sc = {cp:'var(--cp)',np:'var(--np)',a:'var(--a)',fc:'var(--fc)',ac:'var(--ac)'};
      function sp(k){ return '<span class="score-pill" style="background:'+sc[k]+'22;color:'+sc[k]+'">'+s[k]+'</span>'; }

      var expandBtn = p.sessions.length>=2
        ? '<button class="expand-btn" onclick="adminToggleExpand(\''+p.name+'\')">'+(isExpanded?'&#9660;':'&#9654;')+'</button> '
        : '<span style="display:inline-block;width:18px"></span> ';

      var countBadge = p.sessions.length>=2
        ? '<span class="session-num">'+p.sessions.length+'</span>'
        : '<span class="session-num">1</span>';

      // メイン行
      html += '<tr style="background:#fff">'
        + '<td>'+expandBtn+'<strong>'+p.name+'</strong></td>'
        + '<td>'+countBadge+'</td>'
        + '<td>'+latest.date+(latest.memo?'<br><small style="color:var(--light)">'+latest.memo+'</small>':'')+'</td>'
        + '<td>'+roleHtml(latest.role)+'</td>'
        + '<td><span class="type-badge">'+tn+'</span></td>'
        + '<td>'+sp('cp')+'</td><td>'+sp('np')+'</td><td>'+sp('a')+'</td><td>'+sp('fc')+'</td><td>'+sp('ac')+'</td>'
        + '<td><strong>'+tot+'</strong></td>'
        + '<td>'+deltaHtml+'</td>'
        + '<td>'+(hasConcern?'<span class="concern-badge">要注意</span>':'<span class="ok-badge">問題なし</span>')+'</td>'
        + '<td style="white-space:nowrap">'
          + '<button class="btn btn-white" style="padding:3px 8px;font-size:10px" onclick="showDetail(\''+p.name+'\')">詳細</button> '
          + '<button class="btn btn-white" style="padding:3px 8px;font-size:10px;background:#1a1a2e;color:#fff" onclick="openReport(\''+p.name+'\',\''+latest.date+'\')">📄 分析</button> '
          + '<button class="btn btn-white" style="padding:3px 8px;font-size:10px;background:#5b4fcf;color:#fff" onclick="openEditModal(\''+p.name+'\',\''+latest.date+'\')">✏️ 編集</button>'
        + '</td>'
        + '<td style="white-space:nowrap">'
          + (p.sessions.length>=2
            ? '<button class="btn btn-white" style="padding:3px 8px;font-size:10px;background:#2c7a50;color:#fff" onclick="openChangeReport(\''+p.name+'\')">📈 変化</button>'
            : '<span style="font-size:10px;color:var(--light)">2回以上必要</span>')
        + '</td>'
        + '</tr>';

      // 過去回（展開時のみ）
      if(isExpanded && p.sessions.length>=2){
        var past = p.sessions.slice(0, p.sessions.length-1).slice().reverse();
        past.forEach(function(ps, i){
          var nth = p.sessions.length-1-i;
          var ps_tot = ps.scores.cp+ps.scores.np+ps.scores.a+ps.scores.fc+ps.scores.ac;
          function sp2(k){ return '<span class="score-pill" style="background:'+sc[k]+'22;color:'+sc[k]+'">'+ps.scores[k]+'</span>'; }
          html += '<tr style="background:#faf8f4">'
            + '<td style="padding-left:32px;color:var(--light);font-size:11px">第'+nth+'回</td>'
            + '<td><span style="font-size:10px;color:var(--light)">過去</span></td>'
            + '<td style="font-size:11px">'+ps.date+(ps.memo?'<br><small style="color:var(--light)">'+ps.memo+'</small>':'')+'</td>'
            + '<td>'+roleHtml(ps.role)+'</td>'
            + '<td>—</td>'
            + '<td>'+sp2('cp')+'</td><td>'+sp2('np')+'</td><td>'+sp2('a')+'</td><td>'+sp2('fc')+'</td><td>'+sp2('ac')+'</td>'
            + '<td style="color:var(--light)">'+ps_tot+'</td>'
            + '<td>—</td><td>—</td>'
            + '<td style="white-space:nowrap">'
              + '<button class="btn btn-white" style="padding:3px 8px;font-size:10px;background:#1a1a2e;color:#fff" onclick="openReport(\''+p.name+'\',\''+ps.date+'\')">📄 分析</button> '
              + '<button class="btn btn-white" style="padding:3px 8px;font-size:10px;background:#5b4fcf;color:#fff" onclick="openEditModal(\''+p.name+'\',\''+ps.date+'\')">✏️ 編集</button>'
            + '</td>'
            + '<td>—</td>'
            + '</tr>';
        });
      }
    });
    tbody.innerHTML = html;
  }

  // ページネーション
  var pag = document.getElementById('pagination');
  if(pages<=1){ pag.innerHTML=''; return; }
  var pgHtml = '';
  for(var i=1;i<=pages;i++){
    pgHtml+='<button class="page-btn'+(i===currentPage?' active':'')+'\" onclick="goPage('+i+')">'+i+'</button>';
  }
  pag.innerHTML = pgHtml;
}
function goPage(n){ currentPage=n; renderTable(); }

// ===== 要注意リスト =====
function renderConcernList(){
  var persons = allPersons;
  var items = [];
  persons.forEach(function(p){
    var cs = calcConcerns(p);
    if(cs.length>0) items.push({person:p, concerns:cs});
  });
  items.sort(function(a,b){
    var ah = a.concerns.filter(function(c){return c.level==='high';}).length;
    var bh = b.concerns.filter(function(c){return c.level==='high';}).length;
    return bh-ah;
  });

  var cl = document.getElementById('concern-list');
  if(items.length===0){
    cl.innerHTML='<div style="text-align:center;padding:32px;color:var(--light);font-size:13px">現在、懸念事項のある受検者はいません</div>';
    return;
  }
  cl.innerHTML = items.map(function(item){
    var p = item.person;
    var latest = p.sessions[p.sessions.length-1];
    var highCount = item.concerns.filter(function(c){return c.level==='high';}).length;
    var level = highCount>0?'high':'mid';
    var tagsHtml = item.concerns.map(function(c){
      return '<span class="concern-tag '+(c.level==='high'?'red':'amber')+'">'+c.text.split('：')[0]+'</span>';
    }).join('');
    var textHtml = item.concerns.map(function(c){return '• '+c.text;}).join('<br>');
    return '<div class="concern-item '+level+'">'+
      '<div class="concern-item-header">'+
        '<div>'+
          '<div class="concern-name">'+p.name+'</div>'+
          '<div class="concern-date">最終テスト：'+latest.date+(latest.memo?' ('+latest.memo+')':'')+'　第'+p.sessions.length+'回</div>'+
        '</div>'+
        '<button class="btn btn-white" style="font-size:11px;padding:4px 10px;margin-right:4px" onclick="openReport(\''+p.name+'\')">' +'📄 分析</button>'+
        '<button class="btn btn-white" style="font-size:11px;padding:4px 10px;margin-right:4px;background:#2c7a50;color:#fff" onclick="openChangeReport(\''+p.name+'\')">' +'📈 変化</button>'+

// ===== タイプ分布 =====
function renderDistribution(){
  var persons = allPersons;
  var typeCounts = {};
  var typePersons = {};
  persons.forEach(function(p){
    var k = getTypeKey(p.sessions[p.sessions.length-1].scores);
    var tmE = TYPE_MASTER[k];
    var t = (tmE ? (typeof tmE==='object' ? tmE.name : tmE) : k)+'タイプ';
    typeCounts[t]=(typeCounts[t]||0)+1;
    if(!typePersons[t]) typePersons[t]=[];
    typePersons[t].push(p.name);
  });
  var entries = Object.entries(typeCounts).sort(function(a,b){return b[1]-a[1];});

  if(window._typeBarChart) window._typeBarChart.destroy();
  var tbc = document.getElementById('typeBarChart');
  if(tbc && entries.length>0){
    window._typeBarChart = new Chart(tbc,{
      type:'bar',
      data:{labels:entries.map(function(e){return e[0];}),
        datasets:[{data:entries.map(function(e){return e[1];}),
          backgroundColor:'#1a1a2e',borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{ticks:{stepSize:1,font:{size:10}}},y:{ticks:{font:{size:10}}}}}
    });
  }

  // 人生態度分布
  var q1=0,q2=0,q3=0,q4=0;
  persons.forEach(function(p){
    var s = p.sessions[p.sessions.length-1].scores;
    var iOK = s.fc>s.ac, yOK = s.np>=s.cp;
    if(iOK&&yOK) q1++;
    else if(iOK&&!yOK) q2++;
    else if(!iOK&&yOK) q3++;
    else q4++;
  });
  if(window._matrixChart) window._matrixChart.destroy();
  var mc = document.getElementById('matrixChart');
  if(mc){
    window._matrixChart = new Chart(mc,{
      type:'doughnut',
      data:{
        labels:['私OK・あなたOK','私OK・あなたNOT OK','私NOT OK・あなたOK','私もNOT OK・あなたもNOT OK'],
        datasets:[{data:[q1,q2,q3,q4],
          backgroundColor:['#2c7a50','#c0392b','#2c5282','#888780'],borderWidth:2,borderColor:'#fffef9'}]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10,padding:8}}}}
    });
  }

  // タイプ別一覧
  var tbody = document.getElementById('type-detail-body');
  var totalP = persons.length;
  tbody.innerHTML = entries.map(function(e){
    var pct = totalP>0?Math.round(e[1]/totalP*100):0;
    return '<tr><td><span class="type-badge">'+e[0]+'</span></td><td>'+e[1]+'名</td>'+
      '<td>'+pct+'%</td><td style="font-size:11px;color:var(--light)">'+(typePersons[e[0]]||[]).join('、')+'</td></tr>';
  }).join('');
}

    commAdvice:"①楽しい会話の後に「今日一番伝えたかったのは〇〇」と一言まとめる。②ネガティブな状況でも「まず笑えるとしたら何？」という問いで場を解きほぐす。③相手が暗い顔をしているとき、盛り上げようとせず「どうした？」と一言声をかける。",
    growth:"反応が得られ、人と関われる環境で最大限に伸びます。周囲を元気にしながら自分も元気になる好循環が生まれると、成長が加速します。「人を楽しませた経験」を積み重ねることで自己効力感が高まり、それが次のエネルギーを生みます。",
    barrier:"勢いで進み、詰めが甘くなりやすいです。「楽しければいい」という感覚が強いと、アフターフォローや地道な作業が抜けてしまうことも。「始める前に完了のイメージを持つ」習慣が、完走力を高めます。",
    relation:"親しみやすく、自然に周囲を元気づける関係を作ります。深い悩みを持った相手に対しては、「ただそばにいる」「一緒に笑う」という関わり方が、言葉以上に力になることを知っておくと、さらに深い関係が生まれます。",
    work:"盛り上げ役・発信役・巻き込み役として力を発揮します。暗い雰囲気や閉塞感の強い職場では、エネルギーが急速に下がります。「自分がいるとチームが明るくなる」という役割意識を持つと、仕事への誇りにつながります。",
    stress:"否定・抑圧・感情を無視された経験でストレスが高まります。ストレスサインは「急にテンションが落ちる」「投げやりになる」として表れます。周囲が変化に気づきやすいので、早めのサポートが有効です。対処法：①気分が落ちたとき「今日は回復の日」と決めて意図的に休む。②信頼できる人に「本音」を話す時間を作る。",
    message:"あなたの笑顔と熱量は、誰かの「今日もやってみよう」という気持ちに直結しています。それは誰にでもできることではありません。落ちる日があっても、それはあなたの豊かさの裏側です。元気なときも、そうでないときも、あなたはすでに誰かにとって大切な存在です。",

    actions:["今日、誰かを具体的に「〇〇のときの◯◯が面白かった・良かった」とほめる","今週、やりかけのことを一つ「完了」にしてから次に進む","落ち込んだときに使う「元気回復リスト」を今日書き出す"],

// ===== 詳細モーダル =====
function showDetail(name){
  var person = allPersons.find(function(p){return p.name===name;});
  if(!person) return;
  var latest = person.sessions[person.sessions.length-1];
  var s = latest.scores;
  var concerns = calcConcerns(person);

  document.getElementById('modal-title').textContent = name+' さんの詳細';
  var body = '';

  // セッション一覧
  body += '<table style="width:100%;font-size:12px;margin-bottom:16px"><thead><tr>';
  body += '<th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">回</th>';
  body += '<th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">日付</th>';
  ['CP','NP','A','FC','AC','合計'].forEach(function(k){
    body+='<th style="padding:6px;border-bottom:1px solid var(--border)">'+k+'</th>';
  });
  body += '</tr></thead><tbody>';
  person.sessions.forEach(function(ss,i){
    var t=ss.scores.cp+ss.scores.np+ss.scores.a+ss.scores.fc+ss.scores.ac;
    var prev = i>0?person.sessions[i-1]:null;
    var prevT = prev?(prev.scores.cp+prev.scores.np+prev.scores.a+prev.scores.fc+prev.scores.ac):null;
    var dStr = prevT!==null?(t>prevT?'<span style="color:var(--up)">▲+'+(t-prevT)+'</span>':t<prevT?'<span style="color:var(--dn)">▼'+(t-prevT)+'</span>':'—'):'初回';
    body+='<tr><td style="padding:6px">第'+(i+1)+'回</td><td style="padding:6px">'+ss.date+(ss.memo?'<br><small>'+ss.memo+'</small>':'')+'</td>';
    ['cp','np','a','fc','ac'].forEach(function(k){
      body+='<td style="padding:6px;text-align:center">'+ss.scores[k]+'</td>';
    });
    body+='<td style="padding:6px;text-align:center">'+t+' '+dStr+'</td></tr>';
  });
  body += '</tbody></table>';

  if(concerns.length>0){
    body += '<div style="background:#fef6e4;border-left:3px solid var(--warn);padding:10px 12px;border-radius:0 5px 5px 0;font-size:12px;line-height:1.7">';
    body += '<strong style="color:var(--warn)">⚠ 懸念事項</strong><br>';
    body += concerns.map(function(c){return '• '+c.text;}).join('<br>');
    body += '</div>';
  }

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('detail-modal').classList.add('show');
}

// ===== CSV エクスポート =====
function exportCSV(){
  var persons = allPersons;
  var rows = [['氏名','回数','日付','メモ','CP','NP','A','FC','AC','合計','タイプ','懸念']];
  persons.forEach(function(p){
    p.sessions.forEach(function(s,i){
      var t=s.scores.cp+s.scores.np+s.scores.a+s.scores.fc+s.scores.ac;
      var tk=getTypeKey(s.scores);
      var tmEntry2=TYPE_MASTER[tk];
      var tn=tmEntry2?(typeof tmEntry2==='object'?tmEntry2.name:tmEntry2):tk;
      var cs=i===p.sessions.length-1?calcConcerns(p).map(function(c){return c.text;}).join('|'):'';
      rows.push([p.name,i+1,s.date,s.memo||'',s.scores.cp,s.scores.np,s.scores.a,s.scores.fc,s.scores.ac,t,tn+'タイプ',cs]);
    });
  });
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='egogram_data_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ===== CSV/JSON インポート =====
function importCSV(){ document.getElementById('csv-file-input').click(); }

function handleFileImport(event){
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var text = e.target.result;
    try {
      if(file.name.endsWith('.json')){
        var data = JSON.parse(text);
        if(Array.isArray(data)){
          var h = loadHistory();
          var imported = 0;
          data.forEach(function(s){
            // 重複チェック（名前＋日付）
            var dup = h.find(function(x){return x.name===s.name&&x.date===s.date;});
            if(!dup){ h.push(s); imported++; }
          });
          saveHistory(h);
          alert(imported+'件のデータをインポートしました。');
          refreshData();
        }
      } else {
        // CSV
        var lines = text.replace(/^\uFEFF/,'').split('\n').slice(1);
        var h = loadHistory();
        var imported = 0;
        lines.forEach(function(line){
          if(!line.trim()) return;
          var cols = line.split(',').map(function(c){return c.replace(/^"|"$/g,'').replace(/""/g,'"');});
          if(cols.length<9) return;
          var s = {name:cols[0], date:cols[2], memo:cols[3]||'',
            scores:{cp:parseInt(cols[4])||0,np:parseInt(cols[5])||0,a:parseInt(cols[6])||0,fc:parseInt(cols[7])||0,ac:parseInt(cols[8])||0}};
          var dup = h.find(function(x){return x.name===s.name&&x.date===s.date;});
          if(!dup){ h.push(s); imported++; }
        });
        saveHistory(h);
        alert(imported+'件のデータをインポートしました。');
        refreshData();
      }
    } catch(err){ alert('ファイルの読み込みに失敗しました: '+err.message); }
    event.target.value='';
  };
  reader.readAsText(file, 'UTF-8');
}

// ===== グループ管理（URLパラメータ方式） =====
function setGroup(g){
  currentGroup = g;
  STORAGE_KEY  = getGroupKey(g);
  if(g){ sessionStorage.setItem(SESSION_GROUP_KEY, g); }
  else { sessionStorage.removeItem(SESSION_GROUP_KEY); }
  var newUrl = window.location.pathname + (g ? '?group='+encodeURIComponent(g) : '');
  history.replaceState(null, '', newUrl);
  var param = g ? '?group='+encodeURIComponent(g) : '';
  var navInput = document.getElementById('nav-input');
  if(navInput) navInput.href = 'egogram_role_input.html'+param;
  renderGroupSelect();
  refreshData();
}

function renderGroupSelect(){
  var groups = loadGroups();
  var sel = document.getElementById('group-select');
  if(!sel) return;
  sel.innerHTML =
    '<option value=""'+(currentGroup===''?' selected':'')+'>── グループなし ──</option>'+
    groups.map(function(g){
      return '<option value="'+g+'"'+(g===currentGroup?' selected':'')+'>'+g+'</option>';
    }).join('');
}

function onGroupSelect(val){ setGroup(val); }

function createGroup(){
  var name = prompt('グループ名を入力してください\n例：A社_営業部、B社_2024年度');
  if(!name || !name.trim()) return;
  name = name.trim();
  var groups = loadGroups();
  if(groups.indexOf(name) >= 0){ alert('同じ名前のグループが既に存在します。'); return; }
  groups.push(name);
  localStorage.setItem(GROUP_LIST_KEY, JSON.stringify(groups));
  setGroup(name);
}

function deleteGroup(){
  if(!currentGroup){ alert('削除するグループを選択してください。'); return; }
  if(!confirm('「'+currentGroup+'」のグループとデータを全て削除しますか？\nこの操作は取り消せません。')) return;
  localStorage.removeItem(getGroupKey(currentGroup));
  var groups = loadGroups().filter(function(g){ return g !== currentGroup; });
  localStorage.setItem(GROUP_LIST_KEY, JSON.stringify(groups));
  setGroup('');
}

function calcLogic(s){
  var entries=[['CP',s.cp],['NP',s.np],['A',s.a],['FC',s.fc],['AC',s.ac]];
  entries.sort(function(a,b){return b[1]-a[1];});
  var rank1=entries[0][0], rank2=entries[1][0];
  var typeKey=rank1+'-'+rank2;
  var total=s.cp+s.np+s.a+s.fc+s.ac;
  var lowest=entries[entries.length-1][0];
  var otherKey = s.cp>s.np ? 'CP>NP' : 'NP>=CP';
  var selfKey  = s.fc>s.ac ? 'FC>AC' : 'AC>=FC';
  var aKey     = s.a<=8 ? 'low' : s.a>=12 ? 'high' : 'mid';
  var energyKey= total>=70?'high':total>=50?'mid':'low';
  var cpKey    = s.cp<=8?'low':s.cp>=12?'high':'mid';
  var npKey    = s.np<=12?'low':s.np>=15?'high':'mid';
  var fcKey    = s.fc<=10?'low':s.fc>=15?'high':'mid';
  var acKey    = s.ac<=8?'low':s.ac>=14?'high':'mid';
  var acType   = s.ac<=8?'モロ出し':s.ac>=14?'隠す':'腹黒';
  var workA    = aKey;
  return {rank1:rank1,rank2:rank2,typeKey:typeKey,total:total,lowest:lowest,
    otherKey:otherKey,selfKey:selfKey,aKey:aKey,energyKey:energyKey,
    cpKey:cpKey,npKey:npKey,fcKey:fcKey,acKey:acKey,acType:acType,workA:workA};
}

    h+='<div style="border-left:3px solid '+borderColor+';padding:8px 14px;margin-bottom:8px;background:'+bgColor+';border-radius:0 5px 5px 0">';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">';
    h+='<span style="font-size:12px;font-weight:700;color:'+CHG_COLORS[k]+'">'+k+'</span>';
    h+='<span style="font-size:12px;font-weight:700;color:'+dColor+'">'+(d>=0?'+':'')+d+'</span>';
    h+='</div>';
    h+='<div style="font-size:12px;color:#3a3a5a;line-height:1.75">'+meaning+'</div>';
    if(concern) h+='<div style="font-size:11px;color:#c0392b;margin-top:4px;font-weight:600">⚠ '+concern+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // ── 推移グラフ ──
  if(sessions.length>=2){
    h+='<div style="padding:0 32px 20px">';
    h+='<div style="font-family:serif;font-size:14px;font-weight:700;margin-bottom:10px;color:#1a1a2e">スコア推移グラフ（全'+sessions.length+'回）</div>';
    h+='<div style="background:#f7f5ef;border-radius:8px;padding:14px"><div style="position:relative;height:200px"><canvas id="chg-trend-canvas"></canvas></div></div>';
    h+='</div>';
  }

  // ── 面談ヒント ──
  h+='<div style="padding:0 32px 28px">';
  h+='<div style="font-family:serif;font-size:14px;font-weight:700;margin-bottom:10px;color:#1a1a2e">面談・活用のヒント</div>';
  var hints=[];
  if(deltas['AC']>=3&&deltas['FC']<=-2) hints.push('AC上昇＋FC低下：自己抑圧・ストレス蓄積の典型パターン。「最近どんなことがありましたか？」と本人に語らせる場を作りましょう。');
  if(deltas['NP']>=3) hints.push('NPが大きく上昇：誰か特定の人をサポートする状況が生まれた可能性。抱え込んでいないか確認してみましょう。');
  if(deltas['FC']>=3) hints.push('FCが大きく上昇：自己肯定感・充実感が増している状態。何がきっかけか本人に聞くと次の成長ヒントになります。');
  if(Math.abs(tDelta)>=10) hints.push('合計エネルギーが大きく変化：環境変化（異動・転居・人間関係）がなかったか確認しましょう。');
  if(hints.length===0) hints.push('大きな変化がない場合も「安定している」と伝え、継続的な成長を支援する言葉をかけましょう。');
  hints.forEach(function(hint){
    h+='<div style="background:#f7f5ef;border-radius:6px;padding:9px 14px;margin-bottom:6px;font-size:12px;color:#3a3a5a;line-height:1.7">• '+hint+'</div>';
  });
  h+='</div>';
  return h;
}

function drawChangeTrendChart(person){
  var el=document.getElementById('chg-trend-canvas');
  if(!el) return;
  if(window._chgChart){window._chgChart.destroy();}
  var sessions=person.sessions;
  var labels=sessions.map(function(s,i){return '第'+(i+1)+'回\n'+s.date.slice(5);});
  var km={cp:'#c0392b',np:'#2c7a50',a:'#2c5282',fc:'#b7791f',ac:'#6b46a0'};
  var datasets=Object.keys(km).map(function(k){
    return{label:k.toUpperCase(),data:sessions.map(function(s){return s.scores[k];}),
      borderColor:km[k],backgroundColor:'transparent',tension:.4,pointRadius:4,borderWidth:2};
  });
  window._chgChart=new Chart(el,{type:'line',data:{labels:labels,datasets:datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:10,padding:10}}},
      scales:{y:{min:0,max:20,ticks:{stepSize:5,font:{size:10}}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
}

function downloadChangePDF(){
  var name=document.getElementById('chg-modal-title').textContent.replace(' さん — 変化分析レポート','').trim();
  if(typeof html2pdf==='undefined'){window.print();return;}
  html2pdf().set({margin:[8,8],filename:name+'_変化分析レポート.pdf',
    image:{type:'jpeg',quality:.95},html2canvas:{scale:1.5,useCORS:true},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(document.getElementById('chg-modal-body')).save();
}

// ===== 編集モーダル =====
var _editTarget = null;

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openEditModal(name, date){
  var h = loadHistory();
  var rec = h.find(function(s){ return s.name===name && s.date===date; });
  if(!rec){ alert('データが見つかりません。'); return; }
  _editTarget = {name: name, date: date};

  var s = rec.scores;
  var v = s.values || {a:3, b:3, c:3, d:3, e:3};
  var hasValues = !!s.values;

  var fieldStyle = 'width:100%;border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-size:13px;font-family:\'Noto Sans JP\',sans-serif;background:#fff;color:var(--ink);outline:none;box-sizing:border-box';
  var labelStyle = 'font-size:11px;color:var(--light);margin-bottom:3px';

  var sc = {cp:'var(--cp)',np:'var(--np)',a:'var(--a)',fc:'var(--fc)',ac:'var(--ac)'};
  var vc = {a:'var(--va)',b:'var(--vb)',c:'var(--vc)',d:'var(--vd)',e:'var(--ve)'};

  var html = '<div style="display:flex;flex-direction:column;gap:12px">';

  // 氏名
  html += '<div><div style="'+labelStyle+'">氏名</div>' +
    '<input id="edit-name" type="text" value="'+escHtml(rec.name)+'" style="'+fieldStyle+'"></div>';

  // 実施日
  html += '<div><div style="'+labelStyle+'">実施日</div>' +
    '<input id="edit-date" type="date" value="'+escHtml(rec.date)+'" style="'+fieldStyle+'"></div>';

  // メモ
  html += '<div><div style="'+labelStyle+'">メモ（任意）</div>' +
    '<input id="edit-memo" type="text" value="'+escHtml(rec.memo||'')+'" placeholder="例：研修後 / 異動後" style="'+fieldStyle+'"></div>';

  // 役職
  html += '<div><div style="'+labelStyle+'">役職区分</div>' +
    '<select id="edit-role" style="'+fieldStyle+'">' +
    '<option value="">— 未選択 —</option>' +
    ['管理職','一般','若手'].map(function(r){
      return '<option value="'+r+'"'+(rec.role===r?' selected':'')+'>'+r+'</option>';
    }).join('') +
    '</select></div>';

  // エゴグラム スコア
  html += '<div><div style="'+labelStyle+'">エゴグラム スコア（0〜20）</div>' +
    '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">';
  ['cp','np','a','fc','ac'].forEach(function(k){
    html += '<div style="text-align:center">' +
      '<div style="font-size:11px;font-weight:700;color:'+sc[k]+';margin-bottom:4px">'+k.toUpperCase()+'</div>' +
      '<input id="edit-'+k+'" type="number" min="0" max="20" value="'+s[k]+'" ' +
        'style="width:100%;border:1px solid var(--border);border-radius:5px;padding:5px 4px;font-size:14px;font-weight:700;text-align:center;font-family:\'Noto Sans JP\',sans-serif;background:#fff;color:'+sc[k]+';outline:none;box-sizing:border-box">' +
      '</div>';
  });
  html += '</div></div>';

  // 価値観テスト
  html += '<div><div style="'+labelStyle+'">' +
    '<label style="display:flex;align-items:center;gap:6px;cursor:pointer">' +
    '<input type="checkbox" id="edit-values-chk"'+(hasValues?' checked':'')+' onchange="toggleEditValues(this.checked)"> ' +
    '価値観テスト スコア（0〜5）</label></div>' +
    '<div id="edit-values-section" style="display:'+(hasValues?'grid':'none')+';grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px">';
  ['a','b','c','d','e'].forEach(function(k){
    html += '<div style="text-align:center">' +
      '<div style="font-size:11px;font-weight:700;color:'+vc[k]+';margin-bottom:4px">'+k.toUpperCase()+'</div>' +
      '<input id="edit-v'+k+'" type="number" min="0" max="5" step="0.1" value="'+(v[k]!=null?v[k]:3)+'" ' +
        'style="width:100%;border:1px solid var(--border);border-radius:5px;padding:5px 4px;font-size:14px;font-weight:700;text-align:center;font-family:\'Noto Sans JP\',sans-serif;background:#fff;color:'+vc[k]+';outline:none;box-sizing:border-box">' +
      '</div>';
  });
  html += '</div></div>';

  // ボタン
  html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">' +
    '<button onclick="closeEditModal()" style="border:1px solid var(--border);border-radius:6px;padding:8px 18px;font-size:12px;font-weight:700;font-family:\'Noto Sans JP\',sans-serif;cursor:pointer;background:#fff;color:var(--mid)">キャンセル</button>' +
    '<button onclick="saveEditModal()" style="border:none;border-radius:6px;padding:8px 18px;font-size:12px;font-weight:700;font-family:\'Noto Sans JP\',sans-serif;cursor:pointer;background:#1a1a2e;color:#fff">保存する</button>' +
    '</div>';

  html += '</div>';

  document.getElementById('edit-modal-body').innerHTML = html;
  document.getElementById('edit-modal').classList.add('show');
}

function toggleEditValues(checked){
  document.getElementById('edit-values-section').style.display = checked ? 'grid' : 'none';
}

function closeEditModal(){
  document.getElementById('edit-modal').classList.remove('show');
  _editTarget = null;
}

function saveEditModal(){
  if(!_editTarget) return;

  var newName = document.getElementById('edit-name').value.trim();
  var newDate = document.getElementById('edit-date').value;
  var newMemo = document.getElementById('edit-memo').value.trim();
  var newRole = document.getElementById('edit-role').value;

  if(!newName){ alert('氏名を入力してください。'); return; }
  if(!newDate){ alert('実施日を入力してください。'); return; }

  var newScores = {
    cp: Math.min(20,Math.max(0,parseInt(document.getElementById('edit-cp').value)||0)),
    np: Math.min(20,Math.max(0,parseInt(document.getElementById('edit-np').value)||0)),
    a:  Math.min(20,Math.max(0,parseInt(document.getElementById('edit-a').value)||0)),
    fc: Math.min(20,Math.max(0,parseInt(document.getElementById('edit-fc').value)||0)),
    ac: Math.min(20,Math.max(0,parseInt(document.getElementById('edit-ac').value)||0))
  };

  var valChk = document.getElementById('edit-values-chk');
  if(valChk && valChk.checked){
    newScores.values = {
      a: Math.min(5,Math.max(0,Math.round((parseFloat(document.getElementById('edit-va').value)||0)*10)/10)),
      b: Math.min(5,Math.max(0,Math.round((parseFloat(document.getElementById('edit-vb').value)||0)*10)/10)),
      c: Math.min(5,Math.max(0,Math.round((parseFloat(document.getElementById('edit-vc').value)||0)*10)/10)),
      d: Math.min(5,Math.max(0,Math.round((parseFloat(document.getElementById('edit-vd').value)||0)*10)/10)),
      e: Math.min(5,Math.max(0,Math.round((parseFloat(document.getElementById('edit-ve').value)||0)*10)/10))
    };
  }

  var h = loadHistory();
  var idx = h.findIndex(function(s){ return s.name===_editTarget.name && s.date===_editTarget.date; });
  if(idx<0){ alert('データが見つかりません。'); closeEditModal(); return; }

  // 氏名または日付が変わった場合の重複チェック
  if(newName !== _editTarget.name || newDate !== _editTarget.date){
    var conflict = h.findIndex(function(s,i){ return i!==idx && s.name===newName && s.date===newDate; });
    if(conflict>=0){ alert('同じ氏名・日付のデータが既に存在します。'); return; }
  }

  h[idx] = {
    name: newName, date: newDate, memo: newMemo, role: newRole,
    scores: newScores, savedAt: h[idx].savedAt || new Date().toISOString()
  };
  saveHistory(h);
  closeEditModal();
  refreshData();
}
</script>
